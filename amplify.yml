version: 1
applications:
  - appRoot: optiblogai-site
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - printenv FASTAPI_BASE_URL | sed 's/^/FASTAPI_BASE_URL=/' >> .env.production
            - if [ -n "$FASTAPI_API_KEY" ]; then printenv FASTAPI_API_KEY | sed 's/^/FASTAPI_API_KEY=/' >> .env.production; fi
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
