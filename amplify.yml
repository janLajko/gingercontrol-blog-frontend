version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - test -n "$FASTAPI_BASE_URL"
        - printf 'FASTAPI_BASE_URL=%s\n' "$FASTAPI_BASE_URL" >> .env.production
        - if [ -n "$FASTAPI_API_KEY" ]; then printf 'FASTAPI_API_KEY=%s\n' "$FASTAPI_API_KEY" >> .env.production; fi
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
